name: backend-tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          pip install pytest pytest-cov
      - name: Run v3 backend core tests
        run: pytest tests/backend/core tests/db tests/scripts -q
      - name: Run Fund Agent regression tests
        run: pytest tests/fund -q
      - name: Run P8 E2E regression tests
        run: pytest tests/e2e -q
      - name: Run blocking contract guards
        run: |
          python tools/guards/check_contract_hash.py
          python tools/guards/check_canonical_schema.py
          python tools/guards/check_primitives_whitelist.py
          python tools/guards/check_placeholder_binding.py
      - name: Run API inventory guard
        run: python tools/guards/check_api_inventory.py
      - name: Run parser hardcoding guard
        run: python tools/guards/check_parser_hardcoding.py
