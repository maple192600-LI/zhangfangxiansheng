skill_code: parse_bank_boc
display_name: 中国银行流水解析
description: 中国银行流水专用解析规则——针对中国银行标准版网银流水（含中英文表头），自动提取日期、方向、对方、收入、支出、余额，并生成可读摘要，输出结构化数据。
version: "1.0.0"
category: bank_parser
tags: [银行, 流水, 解析, 中国银行, 中行, 基础数据, fund_events]

input:
  file_path:
    type: string
    required: true
    description: 中国银行流水文件路径（xls/xlsx格式）
  entity_code:
    type: string
    required: false
    description: 指定法人编码
  account_code:
    type: string
    required: false
    description: 指定账户编号

output:
  type: object
  properties:
    ok:
      type: boolean
    total_rows:
      type: integer
    transactions:
      type: array
    matched_account:
      type: object
    mapping_rules:
      type: object

runtime:
  timeout_ms: 30000
  dependencies:
    - openpyxl
    - xlrd
