skill_code: gen_report
display_name: "报表生成"
description: "从业务数据中取数，按指定格式生成报表并导出为 Excel 文件。支持现金日记账、资金日报、基础数据表等报表类型。"
version: "1.0.0"
category: report
tags:
  - 报表
  - 导出
  - Excel
inputs:
  - name: report_type
    type: string
    required: true
    description: "报表类型：cash_journal / daily_report / base_data / income_list / expense_list"
  - name: start_date
    type: string
    required: false
    description: "开始日期，格式 YYYY-MM-DD"
  - name: end_date
    type: string
    required: false
    description: "结束日期，格式 YYYY-MM-DD"
  - name: output_path
    type: string
    required: false
    description: "输出文件路径（相对于工作区），默认 outputs/report.xlsx"
outputs:
  - name: file_path
    type: string
  - name: row_count
    type: integer
dependencies:
  - openpyxl
runtime:
  timeout_ms: 30000
  memory_mb: 256
created_by: system
