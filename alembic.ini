# Alembic config -- ZhangFang v2 baseline
# Contract anchor: docs/60_claude_code_support/B_PLAN_COMPLETE_2026-04-24.md P0-3
# ASCII-only to stay compatible with Windows GBK locale when configparser
# reads this file via locale-default encoding.

[alembic]
script_location = alembic
prepend_sys_path = backend
sqlalchemy.url = driver://user:pass@localhost/dbname
file_template = %%(rev)s_%%(slug)s
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
