<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>资金报表系统｜完整前端框架 v4</title>
<style>
  :root{
    --bg:#f5f3ee;
    --panel:#fbfaf7;
    --panel-2:#ffffff;
    --line:#ddd7cc;
    --line-soft:#ebe6dc;
    --text:#2f3a32;
    --muted:#6e746f;
    --green:#7f9b7a;
    --green-2:#e6efe3;
    --green-3:#f0f6ee;
    --accent:#c8b48a;
    --warn:#b87b5d;
    --warn-bg:#faeee8;
    --blue:#6e88a7;
    --blue-bg:#eef3f8;
    --shadow:0 8px 24px rgba(60,60,40,.08);
    --radius:16px;
    --radius-sm:12px;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    color:var(--text);
    background:linear-gradient(180deg,#f6f4ef 0%, #f1eee7 100%);
  }
  .app{
    display:grid;
    grid-template-columns:280px 1fr;
    min-height:100vh;
  }
  .sidebar{
    background:rgba(251,250,247,.92);
    border-right:1px solid var(--line);
    backdrop-filter:blur(8px);
    padding:18px 16px;
    position:sticky;
    top:0;
    height:100vh;
    overflow:auto;
  }
  .brand{
    display:flex;
    flex-direction:column;
    gap:6px;
    padding:12px 14px 18px 14px;
    margin-bottom:8px;
  }
  .brand h1{
    font-size:20px;
    margin:0;
    font-weight:700;
    letter-spacing:.5px;
  }
  .brand p{
    margin:0;
    color:var(--muted);
    font-size:12px;
    line-height:1.7;
  }

  .nav-group{ margin-top:10px; }
  .nav-title{
    font-size:12px;
    color:#7a7f79;
    padding:8px 12px;
    text-transform:uppercase;
    letter-spacing:1px;
  }
  .nav-main{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
    border:none;
    background:transparent;
    border-radius:14px;
    padding:12px 12px;
    cursor:pointer;
    color:var(--text);
    font-size:15px;
    text-align:left;
  }
  .nav-main:hover{ background:#f3f0e8; }
  .nav-main.active{
    background:var(--green-2);
    color:#30422f;
    box-shadow:inset 0 0 0 1px rgba(127,155,122,.22);
    font-weight:600;
  }
  .caret{
    font-size:12px;
    color:#889286;
    width:14px;
    text-align:center;
    flex:0 0 14px;
  }
  .subnav{
    display:none;
    margin:6px 0 4px 10px;
    padding-left:10px;
    border-left:2px solid #e5e0d6;
  }
  .subnav.open{ display:block; }
  .subnav button{
    width:100%;
    background:transparent;
    border:none;
    padding:10px 12px;
    margin:2px 0;
    border-radius:12px;
    text-align:left;
    cursor:pointer;
    color:#465048;
    font-size:14px;
  }
  .subnav button:hover{ background:#f4f1ea; }
  .subnav button.active{
    background:#eef3ec;
    color:#2f4330;
    font-weight:600;
  }

  .main{
    padding:18px 20px 28px;
    min-width:0;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .topbar{
    display:grid;
    grid-template-columns:1fr auto auto;
    gap:14px;
    align-items:center;
    background:rgba(251,250,247,.82);
    border:1px solid var(--line);
    border-radius:18px;
    padding:14px 16px;
    box-shadow:var(--shadow);
  }
  .topbar .sys{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
  }
  .pill{
    padding:8px 12px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:999px;
    color:#465048;
    font-size:13px;
    white-space:nowrap;
  }
  .search{
    padding:10px 14px;
    min-width:280px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:999px;
    color:#6a706c;
    font-size:14px;
  }

  .crumb{
    background:rgba(251,250,247,.95);
    border:1px solid var(--line);
    border-radius:14px;
    padding:10px 14px;
    color:var(--muted);
    font-size:13px;
  }
  .crumb strong{ color:var(--text); }

  .shell{
    background:rgba(251,250,247,.95);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  .right-tabs{
    padding:12px;
    border-bottom:1px solid var(--line);
    background:#f7f4ee;
    overflow-x:auto;
    white-space:nowrap;
  }
  .right-tab{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    height:40px;
    margin-right:8px;
    padding:0 14px;
    border-radius:12px;
    border:1px solid var(--line);
    background:#fff;
    cursor:pointer;
    font-size:14px;
    color:#465048;
  }
  .right-tab.active{
    background:var(--green-2);
    border-color:#d7e5d4;
    color:#2f4330;
    font-weight:600;
  }
  .explain{
    background:#fff7cc;
    border-top:1px solid #efd95e;
    border-bottom:1px solid #efd95e;
    padding:10px 14px;
    color:#6d5b00;
    font-size:13px;
    line-height:1.8;
  }
  .content{
    padding:16px;
  }

  .section{
    background:rgba(251,250,247,.95);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:16px;
    margin-bottom:14px;
  }
  .section:last-child{ margin-bottom:0; }
  .section-title{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:12px;
    gap:12px;
  }
  .section-title h3{
    margin:0;
    font-size:17px;
  }
  .section-title span{
    color:var(--muted);
    font-size:13px;
  }

  .filters-bar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:14px;
  }
  .filter{
    background:#fff;
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px 12px;
    color:#5b635e;
    font-size:13px;
  }
  .btn-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .btn{
    border:none;
    border-radius:12px;
    padding:10px 14px;
    cursor:pointer;
    font-size:14px;
  }
  .btn-primary{
    background:var(--green);
    color:#fff;
  }
  .btn-secondary{
    background:#fff;
    color:#435046;
    border:1px solid var(--line);
  }

  .dashboard-grid{
    display:grid;
    grid-template-columns:1.15fr .85fr;
    gap:14px;
  }
  .dashboard-grid-2{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:14px;
  }
  .widget{
    background:#fff;
    border:1px solid #e7e0d5;
    border-radius:16px;
    padding:14px;
    min-height:120px;
  }
  .widget h4{
    margin:0 0 12px 0;
    font-size:15px;
  }
  .metric-strip{
    display:grid;
    grid-template-columns:repeat(4,minmax(0,1fr));
    gap:12px;
  }
  .metric{
    background:#fff;
    border:1px solid #e7e0d5;
    border-radius:16px;
    padding:14px;
    min-height:90px;
  }
  .metric .label{
    color:var(--muted);
    font-size:13px;
    margin-bottom:10px;
  }
  .metric .value{
    font-size:26px;
    font-weight:700;
    letter-spacing:.3px;
  }
  .metric .sub{
    margin-top:8px;
    color:var(--muted);
    font-size:12px;
    line-height:1.7;
  }

  .progress-list{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .progress-row{
    display:grid;
    grid-template-columns:120px 1fr 54px;
    gap:10px;
    align-items:center;
  }
  .progress-bar{
    height:10px;
    background:#f0ede6;
    border-radius:999px;
    overflow:hidden;
  }
  .progress-bar span{
    display:block;
    height:100%;
    background:linear-gradient(90deg,#9bb796 0%, #7f9b7a 100%);
    border-radius:999px;
  }

  .kanban{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:12px;
  }
  .kanban-col{
    background:#faf8f3;
    border:1px solid var(--line-soft);
    border-radius:14px;
    padding:12px;
  }
  .kanban-col h5{
    margin:0 0 10px 0;
    font-size:13px;
    color:#5b635e;
  }
  .task{
    background:#fff;
    border:1px solid #e7e0d5;
    border-radius:12px;
    padding:10px 10px;
    margin-bottom:8px;
    font-size:13px;
    line-height:1.7;
  }
  .task:last-child{ margin-bottom:0; }

  .quick-grid{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:12px;
  }
  .quick{
    background:#fff;
    border:1px solid #e7e0d5;
    border-radius:14px;
    padding:14px;
    min-height:88px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
  }
  .quick strong{ font-size:15px; }
  .quick span{
    color:var(--muted);
    font-size:12px;
    line-height:1.7;
  }

  .timeline{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .timeline-item{
    display:grid;
    grid-template-columns:90px 1fr;
    gap:12px;
    align-items:start;
  }
  .timeline-item .time{
    color:#6b726c;
    font-size:12px;
    padding-top:2px;
  }
  .timeline-item .desc{
    background:#fff;
    border:1px solid #e7e0d5;
    border-radius:12px;
    padding:10px 12px;
    font-size:13px;
    line-height:1.8;
  }

  .warning-list{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .warning{
    padding:12px;
    border-radius:12px;
    border:1px solid transparent;
    font-size:13px;
    line-height:1.8;
  }
  .warning.warn{
    background:var(--warn-bg);
    border-color:#ebd0c2;
    color:#7f4b32;
  }
  .warning.info{
    background:var(--blue-bg);
    border-color:#d8e1ec;
    color:#4f6681;
  }
  .warning.ok{
    background:#edf4ea;
    border-color:#d9e6d4;
    color:#3f5b3d;
  }

  table{
    width:100%;
    border-collapse:separate;
    border-spacing:0;
    font-size:13px;
    background:#fff;
    border:1px solid #e7e0d5;
    border-radius:14px;
    overflow:hidden;
  }
  th,td{
    padding:10px 10px;
    border-bottom:1px solid #eee7da;
    border-right:1px solid #f0eadf;
    white-space:nowrap;
    text-align:left;
    vertical-align:middle;
  }
  th:last-child, td:last-child{ border-right:none; }
  tr:last-child td{ border-bottom:none; }
  thead th{
    background:#f7f4ee;
    font-weight:600;
    color:#465048;
  }

  .tag{
    display:inline-block;
    padding:4px 8px;
    border-radius:999px;
    font-size:12px;
    border:1px solid transparent;
  }
  .tag-green{ background:#e7f0e4; color:#2f5a2f; border-color:#cfe1cc; }
  .tag-warn{ background:#f7e9e1; color:#874f32; border-color:#ebd0c2; }
  .tag-gray{ background:#f2f1ed; color:#676d68; border-color:#e5e2da; }

  .footer-note{
    margin-top:10px;
    color:#7a7f79;
    font-size:12px;
    line-height:1.8;
  }

  @media (max-width: 1200px){
    .metric-strip,.quick-grid,.dashboard-grid-2,.kanban{ grid-template-columns:1fr; }
    .dashboard-grid{ grid-template-columns:1fr; }
    .app{ grid-template-columns:1fr; }
    .sidebar{ height:auto; position:relative; }
    .topbar{ grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <h1>资金报表系统</h1>
      <p>首页独立置顶，首页风格改为多维表格仪表盘风格。其余目录关系不变。</p>
    </div>

    <div class="nav-group">
      <div class="nav-title">主导航</div>
      <div id="leftNav"></div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="sys">
        <div class="pill">当前法人范围：全部法人</div>
        <div class="pill">当前口径：资金报表系统</div>
      </div>
      <div class="search">全局搜索：账户 / 摘要 / 对方名称 / 模块名</div>
      <div class="pill">本地备份入口</div>
    </div>

    <div class="crumb">当前路径：<strong id="crumbText"></strong></div>

    <div class="shell">
      <div class="right-tabs" id="rightTabs"></div>
      <div class="explain" id="explainText"></div>
      <div class="content" id="contentArea"></div>
    </div>

    <div class="footer-note">这版已经把首页独立到左侧置顶位置，并改成工作导向的仪表盘样式。不是汇报台，是出纳打开软件后的总控台。</div>
  </main>
</div>

  },

  "资金板块": {

      "工作台": {

        ]
      }
    }
  },

  "贷款管理": {
    tabs: [
      { name: "贷款台账", explain: "贷款管理下的贷款台账页。", type: "loan_ledger" },

      "日报agent": { tabs: [{ name: "负责日记账流水识别", explain: "日报 agent 页面。", type: "agent_daily" }] },
      "费用agent": { tabs: [{ name: "生成费用类会计凭证", explain: "费用 agent 页面。", type: "agent_cost" }] },

      "材料agent": { tabs: [{ name: "生成材料类收入凭证", explain: "材料 agent 页面。", type: "agent_material" }] },
      "工资、税费agent": { tabs: [{ name: "工资税费类凭证生成", explain: "工资、税费 agent 页面。", type: "agent_tax" }] },

    }
  },

  "系统设置": {
    secondary: {
      "数据中心": {
        tabs: [
          { name: "账户数据管理", explain: "数据中心下的账户数据管理页。", type: "data_account" },
          { name: "报表模板管理", explain: "数据中心下的报表模板管理页。", type: "data_report_tpl" },
          { name: "部门信息管理", explain: "数据中心下的部门信息管理页。", type: "data_department" },
          { name: "合同台账管理", explain: "数据中心下的合同台账管理页。", type: "data_contract" },
          { name: "发票台账管理", explain: "数据中心下的发票台账管理页。", type: "data_invoice" },

      },
      "规则中心": {
        tabs: [
          { name: "银行流水规则", explain: "规则中心下的银行流水规则页。", type: "rule_bank" },
          { name: "收支规则", explain: "规则中心下的收支规则页。", type: "rule_io" },
          { name: "原始凭证规则", explain: "规则中心下的原始凭证规则页。", type: "rule_origin" },
          { name: "凭证生成规则", explain: "规则中心下的凭证生成规则页。", type: "rule_voucher" },
          { name: "其他待拓展规则", explain: "规则中心下的其他待拓展规则页。", type: "rule_other" }
        ]
      },
      "异常中心": {

const openState = {
  "资金板块": true,
  "OCR识别": true,
  "AI智能体": true,
  "系统设置": true
};

let currentPrimary = "首页";
let currentSecondary = null;
let currentTabIndex = 0;

function getCurrentTabs(){
  const node = navData[currentPrimary];
  if(node.secondary && currentSecondary && node.secondary[currentSecondary]){
    return node.secondary[currentSecondary].tabs;
  }
  return node.tabs || [];
}

function renderLeftNav(){
  const left = document.getElementById("leftNav");
  left.innerHTML = "";

  Object.keys(navData).forEach(primary => {
    const item = navData[primary];
    const hasSecondary = !!item.secondary;

    if(hasSecondary){
      const titleBtn = document.createElement("button");
      titleBtn.className = "nav-main" + (primary === currentPrimary ? " active" : "");
      titleBtn.innerHTML = `${primary} <span class="caret">${openState[primary] ? "▾" : "▸"}</span>`;
      titleBtn.onclick = () => {
        openState[primary] = !openState[primary];
        renderLeftNav();
      };
      left.appendChild(titleBtn);

      const sub = document.createElement("div");
      sub.className = "subnav" + (openState[primary] ? " open" : "");
      Object.keys(item.secondary).forEach(sec => {
        const secBtn = document.createElement("button");
        secBtn.textContent = sec;
        if(primary === currentPrimary && sec === currentSecondary) secBtn.classList.add("active");
        secBtn.onclick = () => {
          currentPrimary = primary;
          currentSecondary = sec;
          currentTabIndex = 0;
          updateUI();
        };
        sub.appendChild(secBtn);
      });
      left.appendChild(sub);
    } else {
      const mainBtn = document.createElement("button");
      mainBtn.className = "nav-main" + (primary === currentPrimary ? " active" : "");
      mainBtn.textContent = primary;
      mainBtn.onclick = () => {
        currentPrimary = primary;
        currentSecondary = null;
        currentTabIndex = 0;
        updateUI();
      };
      left.appendChild(mainBtn);
    }
  });
}

function renderRightTabs(){
  const tabs = getCurrentTabs();
  const box = document.getElementById("rightTabs");
  box.innerHTML = "";
  tabs.forEach((tab, idx) => {
    const btn = document.createElement("button");
    btn.className = "right-tab" + (idx === currentTabIndex ? " active" : "");
    btn.textContent = tab.name;
    btn.onclick = () => {
      currentTabIndex = idx;
      updateUI();
    };
    box.appendChild(btn);
  });
}

function renderCrumbAndExplain(){
  const tabs = getCurrentTabs();
  const activeTab = tabs[currentTabIndex];
  const sec = currentSecondary ? ` / ${currentSecondary}` : "";
  document.getElementById("crumbText").textContent = `${currentPrimary}${sec} / ${activeTab.name}`;
  document.getElementById("explainText").textContent = activeTab.explain;
}

  renderLeftNav();
  const tabs = getCurrentTabs();

  const right = document.getElementById("rightTabs");
  right.innerHTML = "";
  tabs.forEach((tab, idx) => {
    const btn = document.createElement("button");
    btn.className = "right-tab" + (idx === currentTabIndex ? " active" : "");
    btn.textContent = tab.name;
    btn.onclick = () => {
      currentTabIndex = idx;
      updateUI();
    };
    right.appendChild(btn);
  });

  const activeTab = tabs[currentTabIndex];
  const sec = currentSecondary ? ` / ${currentSecondary}` : "";
  document.getElementById("crumbText").textContent = `${currentPrimary}${sec} / ${activeTab.name}`;
  document.getElementById("explainText").textContent = activeTab.explain;

  renderContent();
}
